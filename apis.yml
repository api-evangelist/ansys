description: >-
  Ansys is a global engineering simulation company (now part of Synopsys) with a deep portfolio
  spanning structures (Mechanical, LS-DYNA, Motion), fluids (Fluent, CFX, Rocky), electronics
  (HFSS, Maxwell, SIwave, Icepak), semiconductors (RedHawk, Totem), optics, photonics,
  materials (Granta), 3D design (Discovery, SpaceClaim), embedded software (SCADE), and
  systems (optiSLang, Twin Builder). Ansys also runs Ansys Cloud for burst HPC and offers
  Ansys Apps in the Cloud. The primary public developer surface is PyAnsys — an open-source
  family of 45+ Python packages on GitHub (ansys/pyansys metapackage) that wrap individual
  Ansys products as Pythonic interfaces. There is no public web REST API portal; programmatic
  access is licensed per product and driven through PyAnsys, ACT (Ansys Customization Toolkit),
  product scripting (MAPDL, Fluent TUI/Scheme), and Ansys Cloud.
apis:
  - aid: ansys:pyansys
    name: PyAnsys
    description: >-
      Open-source Python ecosystem for Ansys products. The pyansys metapackage bundles 45+
      libraries including PyMAPDL (Mechanical APDL), PyFluent (Fluent CFD), PyAEDT
      (Electronics Desktop / HFSS / Maxwell / Icepak), PyMechanical (Mechanical),
      PyDPF (Data Processing Framework, with PyDPF-Core and PyDPF-Post), PyPrimeMesh
      (meshing), PyOptislang (optiSLang), PyAdditive, PyDyna (LS-DYNA), PyEDB, PyGranta,
      PySystemCoupling, and visualization helpers. Each library wraps a licensed Ansys
      product over gRPC or COM as a Pythonic interface — not a public REST API.
    humanURL: https://docs.pyansys.com
    baseURL: https://github.com/ansys/pyansys
    tags:
      - Python
      - SDK
      - Open Source
      - gRPC
      - Scripting
    properties:
      - type: Documentation
        url: https://docs.pyansys.com
      - type: Repository
        url: https://github.com/ansys/pyansys
      - type: GitHubOrg
        url: https://github.com/ansys
      - type: Package
        url: https://pypi.org/project/pyansys/
  - aid: ansys:cloud
    name: Ansys Cloud
    description: >-
      Ansys Cloud delivers on-demand HPC and Ansys product instances on Microsoft Azure for
      burst simulation workloads. Cloud access is gated through commercial entitlement and
      the Ansys Cloud portal; no public REST API or self-serve developer documentation is
      published.
    humanURL: https://www.ansys.com/it-solutions/ansys-cloud
    baseURL: https://www.ansys.com/it-solutions/ansys-cloud
    tags:
      - Cloud
      - HPC
      - Azure
      - Bursting
    properties:
      - type: Documentation
        url: https://www.ansys.com/it-solutions/ansys-cloud
